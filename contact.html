<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Saimon Daminelli</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="container nav-content">
            <div class="logo">SAIMON<span>.BI</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">Sobre</a></li>
                <li><a href="contact.html" class="active">Contato</a></li>
            </ul>
        </div>
    </nav>

    <main class="container" style="padding-top: 150px;">
        <div class="glass-card" style="max-width: 600px; margin: 0 auto;">
            <h2>Mande uma mensagem</h2>
            <form action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="97230f37-e1bf-4484-80a1-4d81fe140836">
                
                <div class="form-group">
                    <label>Seu Nome</label>
                    <input type="text" name="name" required placeholder="Como devo te chamar?">
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" name="email" required placeholder="exemplo@email.com">
                </div>
                <div class="form-group">
                    <label>Mensagem</label>
                    <textarea name="message" rows="5" required placeholder="Como posso ajudar?"></textarea>
                </div>
                <button type="submit" class="btn">Enviar E-mail</button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
