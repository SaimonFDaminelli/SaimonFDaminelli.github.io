   <nav>

    <main class="container" style="padding-top: 140px;">
        <div class="contact-wrapper">
            <div class="glass-card">
                <h2>Conecte-se</h2>
                <p class="text-dim">Escolha seu canal preferido para conversarmos:</p>
                
                <div style="margin-top:2rem; font-size:1.1rem;">
                    <a href="https://www.linkedin.com/in/saimondaminelli/" target="_blank" style="color:var(--highlight); text-decoration:none; display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem;">
                        <i class="bi bi-linkedin" style="font-size: 1.5rem;"></i> LinkedIn
                    </a>
                    <a href="https://github.com/SaimonFDaminelli" target="_blank" style="color:white; text-decoration:none; display: flex; align-items: center; gap: 10px;">
                        <i class="bi bi-github" style="font-size: 1.5rem;"></i> GitHub
                    </a>
                </div>
            </div>

            <div class="glass-card">
                <h2>Mande uma mensagem</h2>
                <form action="https://api.web3forms.com/submit" method="POST" style="margin-top: 1.5rem;">
                    <input type="hidden" name="access_key" value="97230f37-e1bf-4484-80a1-4d81fe140836">

                    <div class="form-group">
                        <label>Seu Nome</label>
                        <input type="text" name="name" required placeholder="Como devo te chamar?">
                    </div>
                    
                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" name="email" required placeholder="exemplo@email.com">
                    </div>
                    
                    <div class="form-group">
                        <label>Mensagem</label>
                        <textarea name="message" rows="5" required placeholder="Como posso ajudar?"></textarea>
                    </div>

                    <button type="submit" class="btn" style="width:100%">Enviar E-mail</button>
                </form>
            </div>
        </div>
    </main>

<footer>
